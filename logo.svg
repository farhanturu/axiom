<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Hexagonal grid background -->
  <g opacity="0.05" stroke="#00d4ff" stroke-width="1" fill="none">
    <polygon points="200,30 230,47 230,82 200,100 170,82 170,47"/>
    <polygon points="260,65 290,82 290,117 260,135 230,117 230,82"/>
    <polygon points="140,65 170,82 170,117 140,135 110,117 110,82"/>
    <polygon points="320,100 350,117 350,152 320,170 290,152 290,117"/>
    <polygon points="80,100 110,117 110,152 80,170 50,152 50,117"/>
    <polygon points="200,135 230,152 230,188 200,205 170,188 170,152"/>
  </g>

  <!-- Shield shape -->
  <path d="M200 60 L300 110 L300 210 C300 280 250 330 200 350 C150 330 100 280 100 210 L100 110 Z"
        fill="url(#shield)" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow2)"/>

  <!-- Inner shield -->
  <path d="M200 80 L280 120 L280 200 C280 260 240 300 200 320 C160 300 120 260 120 200 L120 120 Z"
        fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>

  <!-- Lock icon -->
  <g transform="translate(200,190)" filter="url(#glow)">
    <rect x="-18" y="-12" width="36" height="28" rx="4" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M-10,-12 L-10,-24 C-10,-32 10,-32 10,-24 L10,-12"
          fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="2" r="4" fill="url(#accent)"/>
    <line x1="0" y1="2" x2="0" y2="10" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Lightning bolts -->
  <g filter="url(#glow)">
    <polygon points="145,155 165,155 155,175 175,175 145,215 155,185 135,185"
             fill="url(#accent)" opacity="0.8"/>
    <polygon points="245,175 255,175 250,188 260,188 245,210 250,195 240,195"
             fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- AXIOM text -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="36" font-weight="bold" fill="url(#accent)" letter-spacing="8" filter="url(#glow)">
    AXIOM
  </text>

  <!-- Subtitle -->
  <text x="200" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="11" fill="#8899cc" letter-spacing="3" opacity="0.8">
    SECURITY BYPASS FRAMEWORK
  </text>

  <!-- Corner accents -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="30" x2="30" y2="70" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="370" y1="30" x2="330" y2="30" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="370" y1="30" x2="370" y2="70" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="370" x2="70" y2="370" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="30" y1="370" x2="30" y2="330" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="370" y1="370" x2="330" y2="370" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="370" y1="370" x2="370" y2="330" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
</svg>
